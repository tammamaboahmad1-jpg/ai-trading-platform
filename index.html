<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>T AI PLATFORM</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="login-page">

<div class="login-box">

<h1 class="logo">
🚀 T AI PLATFORM
</h1>

<p class="subtitle">
منصة الذكاء الاصطناعي للتداول
</p>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني"
/>

<input
type="password"
id="password"
placeholder="كلمة المرور"
/>

<button id="loginBtn">
دخول المنصة
</button>

<button id="registerBtn">
إنشاء حساب
</button>

</div>

</div>

<!-- APP PAGE -->

<div id="appPage" style="display:none;">

<!-- TOPBAR -->

<div class="topbar">

<div class="brand">

🚀 T AI

</div>

<div class="top-icons">

<div class="online-dot"></div>

🔔

🌐

👤

</div>

</div>

<!-- PROFILE -->

<div class="card profile-card">

<div class="avatar">
👤
</div>

<h2 id="userEmail">
user@gmail.com
</h2>

<div class="vip">
VIP MEMBER 👑
</div>

</div>

<!-- BALANCE -->

<div class="card balance-card">

<div class="balance-title">
الرصيد الإجمالي
</div>

<div class="balance">
$10,000
</div>

<div class="profit">
+15.45%
</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-item active">
🏠 الرئيسية
</div>

<div class="menu-item">
📊 الإشارات
</div>

<div class="menu-item">
💰 المحفظة
</div>

<div class="menu-item">
👑 VIP
</div>

<div class="menu-item">
🎓 الأكاديمية
</div>

<div class="menu-item">
⚙️ الإعدادات
</div>

</div>

<!-- MARKET -->

<div class="card">

<div class="section-title">

📈 السوق المباشر

</div>

<div id="tradingview"
style="height:500px;">
</div>

</div>

<!-- KYC -->

<div class="card">

<div class="section-title">

🪪 توثيق الحساب

</div>

<input
type="text"
id="fullName"
placeholder="الاسم الكامل"
/>

<input
type="text"
id="country"
placeholder="الدولة"
/>

<input
type="text"
id="idNumber"
placeholder="رقم الهوية"
/>

<select id="documentType">

<option>
بطاقة شخصية
</option>

<option>
جواز سفر
</option>

<option>
رخصة قيادة
</option>

</select>

<button onclick="submitKYC()">

إرسال التوثيق 🚀

</button>

<div id="kycStatus">

الحالة:
غير موثق ❌

</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>

</html>
