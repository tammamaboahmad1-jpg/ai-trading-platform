<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>T AI Trading</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.logo{
text-align:center;
margin-top:30px;
margin-bottom:40px;
}

.logo h1{
font-size:55px;
color:#00ffd5;
text-shadow:0 0 20px #00ffd5;
}

.logo p{
color:#9ca3af;
margin-top:10px;
font-size:20px;
}

.auth-box{
background:#07142b;
padding:30px;
border-radius:30px;
box-shadow:0 0 30px #00ffd533;
margin-bottom:40px;
}

.auth-box h2{
text-align:center;
margin-bottom:25px;
font-size:35px;
color:#00ffd5;
}

input{
width:100%;
padding:18px;
margin-top:15px;
border:none;
border-radius:15px;
background:#0f172a;
color:white;
font-size:18px;
}

button{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
background:linear-gradient(45deg,#00ffd5,#0066ff);
color:white;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px #00ffd5;
}

.dashboard{
display:none;
background:#07142b;
padding:30px;
border-radius:30px;
box-shadow:0 0 30px #00ffd533;
}

.card{
background:#08192f;
padding:25px;
border-radius:20px;
margin-top:20px;
}

.card h3{
font-size:28px;
margin-bottom:15px;
color:#00ffd5;
}

.signal{
font-size:28px;
font-weight:bold;
color:#00ff88;
text-align:center;
margin-top:20px;
}

.vip-plans{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:30px;
}

.plan{
background:#08192f;
padding:25px;
border-radius:25px;
text-align:center;
}

.plan h2{
font-size:30px;
margin-bottom:10px;
}

.price{
font-size:45px;
color:#00ffd5;
margin-bottom:20px;
font-weight:bold;
}

.footer{
margin-top:50px;
text-align:center;
color:#6b7280;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<h1>🔥 T AI Trading</h1>
<p>منصة تداول احترافية بالذكاء الاصطناعي</p>
</div>

<div class="auth-box" id="authBox">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="register()">
إنشاء حساب
</button>

<button onclick="login()">
دخول
</button>

</div>

<div class="dashboard" id="dashboard">

<h2 style="text-align:center;color:#00ffd5;font-size:40px;">
🚀 Dashboard
</h2>

<div class="card">

<h3>🤖 AI Signal</h3>

<p>
تحليل مباشر للسوق بواسطة الذكاء الاصطناعي
</p>

<div class="signal" id="signal">
BTC/USDT → BUY 🔥
</div>

</div>

<div class="vip-plans">

<div class="plan">

<h2>🔥 VIP Weekly</h2>

<div class="price">
9 AED
</div>

<a href="https://buy.stripe.com/test_6oUaEZ64F6ccbDx3rq1Nu00" target="_blank">
<button>
اشترك الآن
</button>
</a>

</div>

<div class="plan">

<h2>👑 VIP Monthly</h2>

<div class="price">
30 AED
</div>

<a href="https://buy.stripe.com/test_28E6oJ50B8kkgXRgec1Nu01" target="_blank">
<button>
اشترك شهرياً
</button>
</a>

</div>

<div class="plan">

<h2>🚀 VIP Yearly</h2>

<div class="price">
300 AED
</div>

<a href="https://buy.stripe.com/test_5kQ14pct3fMMfTN9PO1Nu02" target="_blank">
<button>
اشترك سنوياً
</button>
</a>

</div>

</div>

</div>

<div class="footer">
T AI Platform © 2026
</div>

</div>

<!-- Firebase -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "PUT_YOUR_API_KEY",

authDomain: "PUT_YOUR_DOMAIN",

projectId: "PUT_YOUR_PROJECT_ID",

storageBucket: "PUT_YOUR_BUCKET",

messagingSenderId: "PUT_YOUR_SENDER",

appId: "PUT_YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.register = function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("تم إنشاء الحساب 🔥");

})

.catch((error)=>{

alert(error.message);

});

}

window.login = function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

document.getElementById("authBox").style.display="none";

document.getElementById("dashboard").style.display="block";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
