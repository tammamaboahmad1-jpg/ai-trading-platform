<!DOCTYPE html>
<html>

<head>
  <title>AI Trading Platform</title>

  <style>

    body{
      margin:0;
      background:#020b2d;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .topbar{
      background:#111827;
      padding:20px;
      font-size:30px;
      font-weight:bold;
    }

    h1{
      font-size:55px;
      margin-top:40px;
    }

    .box{
      background:#111827;
      width:85%;
      max-width:500px;
      margin:30px auto;
      padding:30px;
      border-radius:20px;
    }

    input{
      width:90%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      font-size:18px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:12px;
      font-size:20px;
      cursor:pointer;
      margin-top:15px;
      color:white;
    }

    .green{
      background:#00c853;
    }

    .red{
      background:#ff1744;
    }

    .blue{
      background:#2962ff;
    }

    .price{
      font-size:45px;
      font-weight:bold;
      margin-top:10px;
    }

    .signal{
      font-size:35px;
      margin-top:20px;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }

  </style>

</head>

<body>

<div class="topbar">
🚀 AI Trading Platform
</div>

<div id="loginBox" class="box">

<h2>Login / Register</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<br>

<button class="green" onclick="enterPlatform()">
Enter Platform
</button>

</div>

<div id="platform" class="hidden">

<h1>📈 Trading Dashboard</h1>

<div class="box">

<h2>Balance</h2>

<div class="price">$10,000</div>

</div>

<div class="box">

<h2>🤖 AI Signal</h2>

<div id="signal" class="signal">
WAITING...
</div>

<button class="green" onclick="generateSignal()">
Generate Signal
</button>

</div>

<div class="box">

<h2>📉 Open Trade</h2>

<button class="green">
BUY
</button>

<button class="red">
SELL
</button>

</div>

<div class="box">

<h2>💳 Subscription</h2>

<div style="font-size:40px;margin-top:10px;">
Premium Plan - $99
</div>

<button class="green">
Upgrade Premium
</button>

</div>

<div class="box">

<h2>🎓 AI Academy</h2>

<p style="font-size:28px;">
Learn Trading + AI Analysis
</p>

<button class="green">
Open Academy
</button>

</div>

<div class="box">

<h2>👤 User Wallet</h2>

<p style="font-size:28px;">
Deposit / Withdraw / Manage Funds
</p>

<button class="green">
Deposit
</button>

<button class="red">
Withdraw
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUmHBoRmQ4naiC4TwouANrYAeScKW9DNk",
  authDomain: "ai-trading-platform-cde38.firebaseapp.com",
  projectId: "ai-trading-platform-cde38",
  storageBucket: "ai-trading-platform-cde38.firebasestorage.app",
  messagingSenderId: "431162854518",
  appId: "1:431162854518:web:bafe44171a3c042782a357"
};

const app = initializeApp(firebaseConfig);

console.log("Firebase Connected 🔥");

window.enterPlatform = function(){

  document.getElementById("loginBox").style.display = "none";

  document.getElementById("platform").classList.remove("hidden");

}

window.generateSignal = function(){

  const signals = [
    "BUY BTC 🚀",
    "SELL ETH 📉",
    "BUY SOL 🔥",
    "SELL XRP ⚠️",
    "BUY GOLD 💰"
  ];

  const randomSignal =
    signals[Math.floor(Math.random()*signals.length)];

  document.getElementById("signal").innerHTML =
    randomSignal;

}

</script>

</body>
</html>
