<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

#splash{
position:fixed;
width:100%;
height:100vh;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:hideSplash 4s forwards;
}

.logo-area{
text-align:center;
}

.circle{
width:120px;
height:120px;
background:linear-gradient(45deg,#06b6d4,#7c3aed);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
margin:auto;
animation:pulse 2s infinite;
}

.logo-area h1{
margin-top:25px;
font-size:40px;
}

.logo-area p{
margin-top:10px;
color:#94a3b8;
}

.loader{
width:220px;
height:8px;
background:#111827;
border-radius:20px;
margin-top:30px;
overflow:hidden;
}

.loader::before{
content:"";
display:block;
width:40%;
height:100%;
background:#06b6d4;
animation:loading 3s linear infinite;
}

#app{
padding:20px;
display:none;
animation:showApp 1s forwards;
animation-delay:4s;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar button{
background:#111827;
border:none;
padding:12px 18px;
border-radius:12px;
color:white;
font-size:20px;
}

.hero{
margin-top:40px;
text-align:center;
}

.hero h1{
font-size:40px;
color:#00e5ff;
}

.hero p{
margin-top:15px;
color:#94a3b8;
font-size:18px;
}

.cards{
display:grid;
gap:20px;
margin-top:40px;
}

.card{
padding:25px;
border-radius:20px;
font-size:22px;
font-weight:bold;
}

.card span{
display:block;
margin-top:15px;
font-size:30px;
}

.green{
background:#052e16;
color:#00ff95;
}

.red{
background:#450a0a;
color:#ff5e5e;
}

.gold{
background:#3b0764;
color:#ffd700;
}

.profit-box{
background:#111827;
padding:30px;
border-radius:20px;
margin-top:35px;
text-align:center;
}

#profit{
font-size:45px;
margin-top:20px;
color:#00ff95;
font-weight:bold;
animation:pulse 2s infinite;
}

.vip-section{
margin-top:40px;
background:#111827;
padding:30px;
border-radius:20px;
text-align:center;
}

.vip-btn{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#7c3aed,#06b6d4);
color:white;
font-size:22px;
font-weight:bold;
}

#popup{
position:fixed;
top:20px;
right:20px;
background:#111827;
padding:18px 30px;
border-radius:15px;
font-size:20px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

@keyframes loading{
0%{
transform:translateX(-100%);
}
100%{
transform:translateX(300%);
}
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
100%{
transform:scale(1);
}
}

@keyframes hideSplash{
0%{
opacity:1;
}
90%{
opacity:1;
}
100%{
opacity:0;
visibility:hidden;
}
}

@keyframes showApp{
to{
display:block;
opacity:1;
}
}

</style>

<script>

setTimeout(()=>{

document.getElementById("app").style.display="block";

},4000);

function showNotif(){

let popup =
document.getElementById("popup");

popup.style.display="block";

setTimeout(()=>{

popup.style.display="none";

},3000);

}

</script>
