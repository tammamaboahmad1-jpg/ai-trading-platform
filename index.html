<!DOCTYPE html>
<html>
<head>
  <title>AI Trading Platform</title>

  <style>
    body{
      margin:0;
      background:#020b2d;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      font-size:55px;
      margin-top:40px;
    }

    .box{
      background:#111827;
      width:85%;
      max-width:500px;
      margin:30px auto;
      padding:30px;
      border-radius:20px;
    }

    input{
      width:90%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      font-size:18px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:12px;
      font-size:20px;
      cursor:pointer;
      margin-top:15px;
    }

    .green{
      background:#00c853;
      color:white;
    }

    .red{
      background:#ff1744;
      color:white;
    }

    .signal{
      font-size:35px;
      margin-top:20px;
      font-weight:bold;
    }

    .price{
      font-size:28px;
      margin-top:10px;
    }

    .hidden{
      display:none;
    }
  </style>
</head>

<body>

<h1>AI Trading Platform</h1>

<div id="loginBox" class="box">

  <h2>Login / Register</h2>

  <input id="email" placeholder="Email">

  <input id="password" type="password" placeholder="Password">

  <br>

  <button onclick="enterPlatform()">
    Enter Platform
  </button>

</div>

<div id="platform" class="hidden">

  <div class="box">

    <h2>💰 Balance</h2>

    <div class="price">$10,000</div>

  </div>

  <div class="box">

    <h2>🤖 AI Signal</h2>

    <div id="signal" class="signal">
      WAITING...
    </div>

    <button class="green" onclick="generateSignal()">
      Generate Signal
    </button>

  </div>

  <div class="box">

    <h2>📈 Open Trade</h2>

    <button class="green">
      BUY
    </button>

    <button class="red">
      SELL
    </button>

  </div>

  <div class="box">

    <h2>💳 Premium Subscription</h2>

    <button onclick="buyPremium()">
      Upgrade Premium
    </button>

  </div>

</div>

<script>

function enterPlatform(){

  document.getElementById("loginBox").style.display = "none";

  document.getElementById("platform").classList.remove("hidden");

}

function generateSignal(){

  let signals = [
    "BUY BTC 🚀",
    "SELL ETH 📉",
    "BUY GOLD 🔥",
    "SELL EURUSD 💥",
    "BUY NASDAQ 📈"
  ];

  let randomSignal =
    signals[Math.floor(Math.random()*signals.length)];

  document.getElementById("signal").innerHTML =
    randomSignal;

}

function buyPremium(){

  alert("Premium Activated 🔥");

}

</script>

</body>
</html>
