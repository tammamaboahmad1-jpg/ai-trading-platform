<style>

body{

.auth-container{

.logo{

}

.auth-box{
background:#111827;
padding:40px;
border-radius:20px;
width:90%;

text-align:center;

}

.auth-box h2{

}

.auth-box input{

padding:15px;

color:white;

}

.login-btn,
.register-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;

}

.login-btn{
background:#06b6d4;
color:white;
}

.register-btn{
background:#7c3aed;
color:white;

.dashboard{

}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.logout-btn{
background:red;
border:none;
padding:10px 20px;
border-radius:10px;
color:white;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:30px;
}

.card{
padding:25px;
border-radius:20px;
font-size:22px;

}

.green{
background:#052e16;

}

.blue{

.gold{

<script>

function login(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

if(email === "admin@gmail.com"
&& password === "123456"){

document.querySelector(".auth-container").style.display="none";

document.getElementById("dashboard").style.display="block";

}else{

document.getElementById("msg").innerHTML =
"❌ Wrong Login";

}

}

function register(){

document.getElementById("msg").innerHTML =
"✅ Account Created";

}

function logout(){

location.reload();

}

</script>
